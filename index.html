<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Hustle &amp; Heal Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:#f8f9fb;font-family:'DM Sans',sans-serif}
    @keyframes spin{to{transform:rotate(360deg)}}
    button:hover{opacity:.88}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzsJKzBsiEKsT1qGCCqHplEzsMrQ4PAKCWNgy17r4d7dSiJB70H4Z6M6h-pUnVu73U/exec";
const PROXY_URL = SCRIPT_URL; // Direct call after CORS is handled by Apps Script

async function fetchAllData() {
  const res = await fetch(PROXY_URL);
  const json = await res.json();
  if (!json.success) throw new Error(json.error || "Failed to load data");
  return json.data;
}

async function postAction(action, data) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, data }),
  });
  const json = await res.json();
  if (!res.ok || !json.success) {
    throw new Error(json.error || `Failed to perform action: ${action}`);
  }
  return json;
}

function parseParticipant(r) {
  return {
    id:r['ID']||'', name:r['Name']||'', age:parseInt(r['Age'])||0,
    gender:r['Gender']||'', race:r['Race/Ethnicity']||'', zip:r['Zip']||'',
    skill:r['Skill Track']||'', status:r['Status']||'waiting',
    referral:r['Referral Source']||'', cohort:r['Cohort']||'',
    caregiver:r['Caregiver']||'', phone:r['Phone']||'',
    preConf:r['Pre-Confidence']!==''?Number(r['Pre-Confidence']):null,
    postConf:r['Post-Confidence']!==''?Number(r['Post-Confidence']):null,
    certEarned:r['Cert Earned']==='TRUE'||r['Cert Earned']===true,
    attendance:parseFloat(r['Attendance %'])||0,
    stipend:parseFloat(r['Stipend Paid'])||0,
    enrollDate:r['Enroll Date']||'', notes:r['Notes']||'',
    forms:{
      consent:r['Form: Consent']||'', preSurvey:r['Form: Pre-Survey']||'',
      postSurvey:r['Form: Post-Survey']||'', midReview:r['Form: Mid Review']||'',
      finalReview:r['Form: Final Review']||'',
    },
    transportation:r['Transportation']==='TRUE'||r['Transportation']===true,
    cycleId:r['Cycle ID']||'CYC-003',
  };
}
function parseAttendance(r) {
  return {
    id:r['Record ID']||'', youthId:r['Youth ID']||'', name:r['Name']||'',
    date:r['Date']||'', skill:r['Skill Track']||'',
    present:r['Present (Y/N)']||'N',
    engagement:r['Engagement (1-5)']!==''?Number(r['Engagement (1-5)']):null,
    followUp:r['Follow-Up Needed (Y/N)']||'N', cycleId:r['Cycle ID']||'',
  };
}
function parseStipend(r) {
  return {
    id:r['Record ID']||'', youthId:r['Youth ID']||'', name:r['Name']||'',
    eligible:parseFloat(r['Eligible ($)'])||0, hours:parseFloat(r['Hours'])||0,
    earned:parseFloat(r['Earned ($)'])||0, paid:parseFloat(r['Paid ($)'])||0,
    paidDate:r['Paid Date']||'', method:r['Method']||'',
    rate:parseFloat(r['Accountability Rate'])||0, cycleId:r['Cycle ID']||'',
  };
}

const F={display:"'Syne',sans-serif",ui:"'DM Sans',sans-serif"};
const C={
  teal:'#15a3c7',tealDark:'#0d7a99',tealDeep:'#0e4f5c',tealGhost:'#e6f6fa',
  green:'#1e8c5a',greenBg:'#e8f5ee',amber:'#d97706',amberBg:'#fef3c7',
  red:'#c0392b',redBg:'#fdecea',slate:'#64748b',slateBg:'#f1f5f9',
  brown:'#78584a',brownBg:'#f5ede8',
};
const TH={
  light:{bg:'#f8f9fb',surface:'#ffffff',raised:'#f0f4f8',secondary:'#f4f7fa',border:'#e2e8f0',text:'#1e293b',textSec:'#475569',muted:'#94a3b8',altRow:'#f8fafc'},
  dark:{bg:'#0f172a',surface:'#1e293b',raised:'#263347',secondary:'#1a2540',border:'#334155',text:'#f1f5f9',textSec:'#94a3b8',muted:'#64748b',altRow:'#162032'},
};
const CHART_COLORS=['#15a3c7','#d97706','#1e8c5a','#7c3aed','#0d7a99','#0891b2','#c0392b','#78584a'];
const STATUS_CFG={
  waiting:{label:"Waiting",color:C.amber,bg:C.amberBg},
  "no-response":{label:"No Response",color:C.slate,bg:C.slateBg},
  "next-cohort":{label:"Next Cohort",color:C.brown,bg:C.brownBg},
  enrolled:{label:"Enrolled",color:C.teal,bg:C.tealGhost},
  active:{label:"Active",color:C.green,bg:C.greenBg},
  completed:{label:"Completed",color:C.tealDeep,bg:C.tealGhost},
  withdrawn:{label:"Withdrawn",color:C.red,bg:C.redBg},
};
const SKILLS=["Hair","Makeup","Nails","Auto-mechanics","Graphic Design & T-shirt Printing","Barbering"];
const SOURCES=["Court","Community","School","Self-Referral"];
const STATUSES=["waiting","no-response","next-cohort","enrolled","active","completed","withdrawn"];
const GENDERS=["Female","Male","Non-binary","Prefer not to say"];
const RACES=["Black/African American","Hispanic/Latino","White","Asian","Multiracial","Other"];
const TABS=[{id:"home",label:"HOME",icon:"home"},{id:"participants",label:"PARTICIPANTS",icon:"users"},{id:"attendance",label:"ATTENDANCE",icon:"clipboard"},{id:"stipends",label:"STIPENDS",icon:"dollar"},{id:"trends",label:"TRENDS",icon:"trendUp"}];

const Icon=({name,size=16,color="currentColor",strokeWidth=1.75})=>{
  const s={width:size,height:size,display:"inline-block",flexShrink:0,verticalAlign:"middle"};
  const p={fill:"none",stroke:color,strokeWidth,strokeLinecap:"round",strokeLinejoin:"round"};
  const icons={
    home:<><path {...p} d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline {...p} points="9 21 9 12 15 12 15 21"/></>,
    users:<><path {...p} d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle {...p} cx="9" cy="7" r="4"/><path {...p} d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></>,
    clipboard:<><rect {...p} x="9" y="2" width="6" height="4" rx="1"/><path {...p} d="M9 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2h-3"/><line {...p} x1="9" y1="12" x2="15" y2="12"/><line {...p} x1="9" y1="16" x2="13" y2="16"/></>,
    dollar:<><line {...p} x1="12" y1="1" x2="12" y2="23"/><path {...p} d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>,
    trendUp:<><polyline {...p} points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline {...p} points="17 6 23 6 23 12"/></>,
    user:<><path {...p} d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle {...p} cx="12" cy="7" r="4"/></>,
    fileText:<><path {...p} d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline {...p} points="14 2 14 8 20 8"/><line {...p} x1="16" y1="13" x2="8" y2="13"/><line {...p} x1="16" y1="17" x2="8" y2="17"/></>,
    sun:<><circle {...p} cx="12" cy="12" r="5"/><line {...p} x1="12" y1="1" x2="12" y2="3"/><line {...p} x1="12" y1="21" x2="12" y2="23"/><line {...p} x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line {...p} x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line {...p} x1="1" y1="12" x2="3" y2="12"/><line {...p} x1="21" y1="12" x2="23" y2="12"/><line {...p} x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line {...p} x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>,
    moon:<><path {...p} d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></>,
    refresh:<><polyline {...p} points="23 4 23 10 17 10"/><polyline {...p} points="1 20 1 14 7 14"/><path {...p} d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></>,
    x:<><line {...p} x1="18" y1="6" x2="6" y2="18"/><line {...p} x1="6" y1="6" x2="18" y2="18"/></>,
    check:<><polyline {...p} points="20 6 9 17 4 12"/></>,
    alertCircle:<><circle {...p} cx="12" cy="12" r="10"/><line {...p} x1="12" y1="8" x2="12" y2="12"/><line {...p} x1="12" y1="16" x2="12.01" y2="16"/></>,
    plusCircle:<><circle {...p} cx="12" cy="12" r="10"/><line {...p} x1="12" y1="8" x2="12" y2="16"/><line {...p} x1="8" y1="12" x2="16" y2="12"/></>,
  };
  return <svg viewBox="0 0 24 24" style={s} aria-hidden="true">{icons[name]||null}</svg>;
};

function CJSPie({data,height=200}){
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'doughnut',data:{labels:data.map(d=>d.label),datasets:[{data:data.map(d=>d.count),backgroundColor:CHART_COLORS,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:"'DM Sans',sans-serif",size:11},padding:10,boxWidth:12}}}}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data)]);
  if(!data||!data.length)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:C.slate,fontSize:12}}>No data yet</div>;
  return <div style={{height,position:"relative"}}><canvas ref={ref}/></div>;
}
function CJSBar({data,color,height=200}){
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'bar',data:{labels:data.map(d=>d.label),datasets:[{data:data.map(d=>d.count),backgroundColor:color||C.teal,borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{family:"'DM Sans',sans-serif",size:11}},grid:{display:false}},y:{ticks:{font:{family:"'DM Sans',sans-serif",size:11}},beginAtZero:true}}}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data),color]);
  if(!data||!data.length)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:C.slate,fontSize:12}}>No data yet</div>;
  return <div style={{height,position:"relative"}}><canvas ref={ref}/></div>;
}
function CJSTrendBar({data,dataKey,color,height=200}){
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'bar',data:{labels:data.map(d=>d.cycleName),datasets:[{data:data.map(d=>d[dataKey]),backgroundColor:color,borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{family:"'DM Sans',sans-serif",size:11}},grid:{display:false}},y:{ticks:{font:{family:"'DM Sans',sans-serif",size:11}},beginAtZero:true}}}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data),dataKey,color]);
  if(!data||!data.length)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:C.slate,fontSize:12}}>No data yet</div>;
  return <div style={{height,position:"relative"}}><canvas ref={ref}/></div>;
}
function CJSLine({data,dataKey,color,height=200,yMax}){
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data||!data.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type:'line',data:{labels:data.map(d=>d.cycleName),datasets:[{data:data.map(d=>d[dataKey]),borderColor:color,backgroundColor:color+'22',borderWidth:3,pointRadius:5,pointBackgroundColor:color,tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{family:"'DM Sans',sans-serif",size:11}},grid:{display:false}},y:{ticks:{font:{family:"'DM Sans',sans-serif",size:11}},beginAtZero:true,...(yMax?{max:yMax}:{})}}}});
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(data),dataKey,color]);
  if(!data||!data.length)return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:C.slate,fontSize:12}}>No data yet</div>;
  return <div style={{height,position:"relative"}}><canvas ref={ref}/></div>;
}

const ChartCard=({title,children,dm})=>{const th=dm?TH.dark:TH.light;return <div style={{background:th.surface,borderRadius:10,padding:"18px 20px",border:`1px solid ${th.border}`,boxShadow:`0 1px 4px rgba(0,0,0,${dm?.12:.06})`}}><h3 style={{fontFamily:F.ui,fontSize:11,fontWeight:700,color:th.muted,textTransform:"uppercase",letterSpacing:.8,marginBottom:14}}>{title}</h3>{children}</div>;};
const Badge=({status})=>{const s=STATUS_CFG[status]||STATUS_CFG.waiting;return <span style={{display:"inline-block",padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:600,fontFamily:F.ui,background:s.bg,color:s.color,border:`1px solid ${s.color}33`,whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:.6}}>{s.label}</span>;};
const AttBar=({pct,dm})=>{if(!pct)return <span style={{color:dm?TH.dark.muted:TH.light.muted,fontSize:12}}>--</span>;const bc=pct>=80?C.green:pct>=60?C.amber:C.red;return <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,height:6,background:dm?TH.dark.border:TH.light.border,borderRadius:3,overflow:"hidden",minWidth:50}}><div style={{width:`${pct}%`,height:"100%",background:bc,borderRadius:3}}/></div><span style={{fontSize:12,fontWeight:600,color:bc,minWidth:32}}>{pct}%</span></div>;};
const Spinner=({dm})=><div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:60,gap:16}}><div style={{width:40,height:40,borderRadius:"50%",border:`3px solid ${dm?TH.dark.border:TH.light.border}`,borderTopColor:C.teal,animation:"spin 0.8s linear infinite"}}/><div style={{fontSize:13,fontWeight:500,color:C.teal,textTransform:"uppercase",letterSpacing:.5}}>Loading data...</div></div>;
const ErrorBanner=({message,onRetry})=><div style={{background:C.redBg,border:`1.5px solid ${C.red}44`,borderRadius:10,padding:"16px 20px",margin:"20px 0",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}><div><div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:4}}>Connection Error</div><div style={{fontSize:13,color:"#7f1d1d"}}>{message}</div></div><button onClick={onRetry} style={{padding:"8px 18px",background:C.red,color:"white",border:"none",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer"}}>Retry</button></div>;
const Modal=({open,onClose,title,subtitle,children,dm,wide})=>{if(!open)return null;const th=dm?TH.dark:TH.light;return <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(15,23,42,0.65)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}><div onClick={e=>e.stopPropagation()} style={{background:th.surface,borderRadius:12,maxWidth:wide?960:660,width:"100%",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 24px",borderBottom:`1px solid ${th.border}`}}><div><h2 style={{fontFamily:F.ui,fontSize:17,fontWeight:700,color:th.text,margin:0}}>{title}</h2>{subtitle&&<div style={{fontSize:12,color:th.muted,marginTop:2}}>{subtitle}</div>}</div><button onClick={onClose} style={{background:"none",border:"none",padding:6,cursor:"pointer",display:"flex",borderRadius:6}}><Icon name="x" size={18} color={th.muted}/></button></div><div style={{padding:"20px 24px"}}>{children}</div></div></div>;};
const Sect=({title,icon,children,dm})=>{const th=dm?TH.dark:TH.light;return <div style={{marginBottom:14,padding:"14px 16px",background:th.raised,borderRadius:8,borderLeft:`3px solid ${C.teal}`}}><h3 style={{fontFamily:F.ui,fontSize:12,fontWeight:700,color:C.teal,textTransform:"uppercase",letterSpacing:.8,marginBottom:12,display:"flex",alignItems:"center",gap:6}}><Icon name={icon} size={13} color={C.teal}/>{title}</h3>{children}</div>;};
const Lbl=({children})=><div style={{fontWeight:600,fontFamily:F.ui,color:TH.light.textSec,fontSize:11,textTransform:"uppercase",letterSpacing:.6,marginBottom:4}}>{children}</div>;
const Inp=({value,onChange,placeholder,type,dm,style:extra,...rest})=>{const th=dm?TH.dark:TH.light;return <input type={type||"text"} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${th.border}`,borderRadius:6,fontSize:13,fontFamily:F.ui,background:th.surface,color:th.text,boxSizing:"border-box",...extra}} {...rest}/>;};
const Sel=({value,onChange,options,placeholder,dm})=>{const th=dm?TH.dark:TH.light;return <select value={value||""} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${th.border}`,borderRadius:6,fontSize:13,fontFamily:F.ui,background:th.surface,color:th.text,boxSizing:"border-box"}}>{placeholder&&<option value="">{placeholder}</option>}{options.map(o=>{const v=typeof o==='string'?o:o.value;return <option key={v} value={v}>{typeof o==='string'?o:o.label}</option>;})}</select>;};
const Btn=({children,onClick,primary,dm,small,loading,danger,full})=><button onClick={onClick} disabled={loading} style={{padding:small?"6px 14px":"9px 22px",border:"none",borderRadius:7,fontFamily:F.ui,fontSize:small?12:14,fontWeight:600,cursor:loading?"wait":"pointer",width:full?"100%":"auto",background:danger?C.red:primary?C.teal:dm?TH.dark.raised:TH.light.border,color:primary||danger?"white":dm?TH.dark.text:TH.light.textSec,opacity:loading?.7:1}}>{loading?"Saving...":children}</button>;

function HomeTab({data,attData,stipData,dm}){
  const th=dm?TH.dark:TH.light;
  const ap=data.filter(p=>p.status==="active");const cp=data.filter(p=>p.status==="completed");
  const tracked=data.filter(p=>["active","completed"].includes(p.status));
  const totStip=stipData.reduce((s,st)=>s+st.paid,0);
  const wg=tracked.filter(p=>p.preConf&&p.postConf);
  const avgG=wg.length>0?(wg.reduce((s,p)=>s+(p.postConf-p.preConf),0)/wg.length).toFixed(1):0;
  const totalAtt=attData.length,presC=attData.filter(a=>a.present==="Y").length;
  const attRate=totalAtt>0?Math.round((presC/totalAtt)*100):0;
  const yAtt={};attData.forEach(a=>{if(!yAtt[a.youthId])yAtt[a.youthId]={total:0,present:0};yAtt[a.youthId].total++;if(a.present==="Y")yAtt[a.youthId].present++;});
  const yIds=Object.keys(yAtt);
  const cons=yIds.filter(id=>yAtt[id].total>0&&(yAtt[id].present/yAtt[id].total)>=.8).length;
  const consRate=yIds.length>0?Math.round((cons/yIds.length)*100):0;
  const cert=tracked.filter(p=>p.certEarned).length;
  const acc=[C.teal,C.green,C.teal,C.green,C.tealDark,C.amber,C.teal,C.green];
  const tiles=[
    {v:data.length,l:"Total Referrals",sub:"all time"},
    {v:ap.length,l:"Currently Active",sub:"this cycle"},
    {v:`${attRate}%`,l:"Attendance Rate",sub:"sessions recorded"},
    {v:`${data.length>0?Math.round((cp.length/data.length)*100):0}%`,l:"Completion Rate",sub:"of enrolled"},
    {v:`${tracked.length>0?Math.round((cert/tracked.length)*100):0}%`,l:"Certification Rate",sub:"of active/completed"},
    {v:`$${totStip.toLocaleString()}`,l:"Stipends Paid",sub:"total disbursed"},
    {v:`+${avgG}`,l:"Confidence Growth",sub:"avg pre to post"},
    {v:`${consRate}%`,l:"Consistency 80%+",sub:"of tracked youth"},
  ];
  const skillD=SKILLS.map(s=>({label:s,count:data.filter(p=>p.skill===s).length})).filter(x=>x.count>0);
  const refD=SOURCES.map(s=>({label:s,count:data.filter(p=>p.referral===s).length})).filter(x=>x.count>0);
  const genD=GENDERS.map(g=>({label:g,count:data.filter(p=>p.gender===g).length})).filter(x=>x.count>0);
  const raceD=RACES.map(r=>({label:r,count:data.filter(p=>p.race===r).length})).filter(x=>x.count>0);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:12,marginBottom:28}}>
        {tiles.map((t,i)=>(

function TrendsTab({data,attData,stipData,dm}){
  const CL={'CYC-001':'Fall 2025','CYC-002':'Winter 2026','CYC-003':'Spring 2026'};
  const cycles=[...new Set([...data,...attData,...stipData].map(r=>r.cycleId).filter(Boolean))].sort();
  const trends=cycles.map(cid=>{
    const cp=data.filter(p=>p.cycleId===cid);const ca=attData.filter(a=>a.cycleId===cid);const cs=stipData.filter(s=>s.cycleId===cid);
    const comp=cp.filter(p=>p.status==='completed');const cert=cp.filter(p=>p.certEarned);
    const tr=cp.filter(p=>['active','completed'].includes(p.status));
    const aR=ca.length>0?Math.round((ca.filter(a=>a.present==="Y").length/ca.length)*100):0;
    const wg=tr.filter(p=>p.preConf&&p.postConf);
    const aG=wg.length>0?(wg.reduce((s,p)=>s+(p.postConf-p.preConf),0)/wg.length).toFixed(1):0;
    return{cycleName:CL[cid]||cid,enrollment:cp.length,attendanceRate:aR,completionRate:cp.length>0?Math.round((comp.length/cp.length)*100):0,certificationRate:tr.length>0?Math.round((cert.length/tr.length)*100):0,avgConfidenceGrowth:parseFloat(aG)||0,totalStipendsPaid:cs.reduce((s,st)=>s+st.paid,0)};
  });
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(340px,1fr))",gap:18}}>
      <ChartCard title="Enrollment by Cycle" dm={dm}><CJSTrendBar data={trends} dataKey="enrollment" color={C.teal}/></ChartCard>
      <ChartCard title="Attendance Rate by Cycle" dm={dm}><CJSLine data={trends} dataKey="attendanceRate" color={C.tealDark} yMax={100}/></ChartCard>
      <ChartCard title="Completion Rate by Cycle" dm={dm}><CJSLine data={trends} dataKey="completionRate" color={C.amber} yMax={100}/></ChartCard>
      <ChartCard title="Certification Rate by Cycle" dm={dm}><CJSTrendBar data={trends} dataKey="certificationRate" color={C.green}/></ChartCard>
      <ChartCard title="Avg Confidence Growth by Cycle" dm={dm}><CJSLine data={trends} dataKey="avgConfidenceGrowth" color={C.tealDeep}/></ChartCard>
      <ChartCard title="Total Stipends Paid by Cycle" dm={dm}><CJSTrendBar data={trends} dataKey="totalStipendsPaid" color={C.amber}/></ChartCard>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("home");const [dm,setDm]=useState(false);
  const [participants,setParticipants]=useState([]);const [attData,setAttData]=useState([]);
  const [stipData,setStipData]=useState([]);const [settings,setSettings]=useState({});
  const [loading,setLoading]=useState(true);const [error,setError]=useState(null);
  const th=dm?TH.dark:TH.light;
  const loadData=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      const r=await fetchAllData();
      setParticipants((r.participants||[]).map(parseParticipant));
      setAttData((r.attendance||[]).map(parseAttendance));
      setStipData((r.stipends||[]).map(parseStipend));
      setSettings(r.settings||{});
    }catch(e){setError(e.message||"Could not connect to data.");}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{loadData();},[loadData]);
  const handleSave=async(d)=>{await postAction('saveParticipant',d);await loadData();};
  const handleAdd=async(p)=>{await postAction('addParticipant',p);await loadData();};
  const programName=settings['Program Name']||'Hustle & Heal';
  const orgName=settings['Organization']||'Legacies Empowered';
  const currentCycle=settings['Current Cycle']||'';
  return(
    <div style={{minHeight:"100vh",background:th.bg,fontFamily:F.ui,color:th.text}}>
      <div style={{background:C.tealDeep,color:"white",padding:"18px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontFamily:F.display,fontSize:26,fontWeight:800,margin:0,lineHeight:1.15,letterSpacing:.5}}>{programName.toUpperCase()} DASHBOARD</h1>
          <div style={{fontSize:12,opacity:.85,marginTop:2}}>{orgName} Youth Workforce Program</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {currentCycle&&<div style={{background:"rgba(255,255,255,.18)",padding:"6px 18px",borderRadius:20,fontSize:13,fontWeight:700}}>{currentCycle}</div>}
          <button onClick={loadData} title="Refresh" style={{background:"rgba(255,255,255,.2)",border:"none",color:"white",width:40,height:40,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="refresh" size={16} color="white"/></button>
          <button onClick={()=>setDm(d=>!d)} title="Toggle dark mode" style={{background:"rgba(255,255,255,.2)",border:"none",color:"white",width:40,height:40,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name={dm?"sun":"moon"} size={16} color="white"/></button>
        </div>
      </div>
      <div style={{height:4,background:C.teal}}/>
      <div style={{display:"flex",background:th.surface,borderBottom:`2px solid ${th.border}`,padding:"0 28px",overflowX:"auto"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{fontFamily:F.ui,fontSize:13,fontWeight:600,padding:"13px 20px",border:"none",background:"transparent",cursor:"pointer",whiteSpace:"nowrap",color:tab===t.id?C.teal:th.muted,borderBottom:tab===t.id?`2px solid ${C.teal}`:"2px solid transparent",transition:"color .2s"}}><span style={{display:"inline-flex",alignItems:"center",gap:6}}><Icon name={t.icon} size={14}/>{t.label}</span></button>)}
      </div>
      <div style={{maxWidth:1200,margin:"0 auto",padding:24}}>
        {error&&<ErrorBanner message={error} onRetry={loadData}/>}
        {loading?<Spinner dm={dm}/>:<>
          {tab==="home"&&<HomeTab data={participants} attData={attData} stipData={stipData} dm={dm}/>}
          {tab==="participants"&&<ParticipantsTab data={participants} onSave={handleSave} onAdd={handleAdd} dm={dm}/>}
          {tab==="attendance"&&<AttendanceTab attData={attData} dm={dm}/>}
          {tab==="stipends"&&<StipendsTab stipData={stipData} dm={dm}/>}
          {tab==="trends"&&<TrendsTab data={participants} attData={attData} stipData={stipData} dm={dm}/>}
        </>}
      </div>
      <div style={{textAlign:"center",padding:16,fontSize:11,color:th.muted,borderTop:`1px solid ${th.border}`,marginTop:24}}>
        {programName} Dashboard | {orgName} | Built by Sun-Up Solutions
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
